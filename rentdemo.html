<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow, noarchive">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>租房管理系統</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg-primary: #ffffff;
    --bg-secondary: #f7f6f3;
    --bg-tertiary: #eeece6;
    --bg-info: #e8f2fd;
    --bg-success: #e6f7ee;
    --bg-warning: #fff8e6;
    --bg-danger: #fceaea;
    --bg-empty: #f0f0ee;
    --text-primary: #1a1a18;
    --text-secondary: #5a5955;
    --text-tertiary: #999890;
    --text-info: #1761a8;
    --text-success: #1a7a42;
    --text-warning: #a06800;
    --text-danger: #b03030;
    --border-light: rgba(0,0,0,0.08);
    --border-mid: rgba(0,0,0,0.16);
    --border-strong: rgba(0,0,0,0.32);
    --border-info: #b8d4f5;
    --border-success: #a3ddb8;
    --border-warning: #f5d98a;
    --border-danger: #f5b8b8;
    --radius-sm: 6px;
    --radius-md: 10px;
    --radius-lg: 14px;
    --radius-xl: 20px;
    --font: 'PingFang TC', 'Noto Sans TC', -apple-system, BlinkMacSystemFont, sans-serif;
    --shadow-sm: 0 1px 4px rgba(0,0,0,0.06);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg-primary: #1c1c1a;
      --bg-secondary: #252523;
      --bg-tertiary: #111110;
      --bg-info: #0b2d55;
      --bg-success: #0b2e1c;
      --bg-warning: #2e1f00;
      --bg-danger: #2e0f0f;
      --bg-empty: #222220;
      --text-primary: #f0ede8;
      --text-secondary: #b0ada6;
      --text-tertiary: #777570;
      --text-info: #7db5f0;
      --text-success: #5fc98a;
      --text-warning: #f5c842;
      --text-danger: #f08080;
      --border-light: rgba(255,255,255,0.08);
      --border-mid: rgba(255,255,255,0.16);
      --border-strong: rgba(255,255,255,0.32);
      --border-info: #1761a8;
      --border-success: #1a7a42;
      --border-warning: #a06800;
      --border-danger: #b03030;
    }
  }
  body { font-family: var(--font); background: var(--bg-tertiary); color: var(--text-primary); }
  #app { display: flex; min-height: 100vh; }

  /* ── Sidebar ── */
  .sidebar {
    width: 224px; min-height: 100vh; background: var(--bg-primary);
    border-right: 0.5px solid var(--border-light);
    display: flex; flex-direction: column; flex-shrink: 0;
    position: sticky; top: 0; height: 100vh; overflow-y: auto;
  }
  .sidebar-logo { padding: 24px 20px 18px; border-bottom: 0.5px solid var(--border-light); }
  .logo-icon { font-size: 22px; margin-bottom: 6px; }
  .logo-text { font-size: 14px; font-weight: 600; color: var(--text-primary); letter-spacing: 0.02em; }
  .logo-sub { font-size: 11px; color: var(--text-tertiary); margin-top: 2px; }
  .sidebar-section { padding: 14px 12px 6px; }
  .sidebar-label { font-size: 10px; color: var(--text-tertiary); letter-spacing: 0.1em; text-transform: uppercase; padding: 0 8px; margin-bottom: 5px; }
  .nav-item {
    display: flex; align-items: center; gap: 8px; padding: 8px 10px;
    border-radius: var(--radius-md); cursor: pointer; font-size: 13px;
    color: var(--text-secondary); transition: background 0.14s; margin-bottom: 2px;
    border: none; background: none; width: 100%; text-align: left; font-family: var(--font);
  }
  .nav-item:hover { background: var(--bg-secondary); color: var(--text-primary); }
  .nav-item.active { background: var(--bg-secondary); color: var(--text-primary); font-weight: 500; }
  .nav-item .nav-icon { font-size: 15px; width: 18px; text-align: center; }

  .sidebar-bottom { margin-top: auto; padding: 12px; }
  .sync-status { font-size: 11px; color: var(--text-tertiary); padding: 0 8px 6px; }

  /* ── Main ── */
  .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .topbar {
    height: 56px; background: var(--bg-primary);
    border-bottom: 0.5px solid var(--border-light);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 28px; flex-shrink: 0; position: sticky; top: 0; z-index: 10;
  }
  .topbar-left { display: flex; align-items: center; gap: 10px; min-width: 0; }
  .topbar-title { font-size: 15px; font-weight: 600; color: var(--text-primary); }
  .topbar-actions { display: flex; gap: 8px; align-items: center; }
  .content { padding: 28px; flex: 1; }

  /* ── Buttons ── */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 14px; border-radius: var(--radius-md);
    font-size: 13px; cursor: pointer; border: 0.5px solid var(--border-mid);
    background: var(--bg-primary); color: var(--text-primary);
    transition: background 0.12s; font-family: var(--font); white-space: nowrap;
  }
  .btn:hover { background: var(--bg-secondary); }
  .btn-primary { background: var(--text-primary); color: var(--bg-primary); border-color: var(--text-primary); }
  .btn-primary:hover { opacity: 0.85; background: var(--text-primary); }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn-danger { color: var(--text-danger); border-color: var(--border-danger); }
  .btn-danger:hover { background: var(--bg-danger); }
  .btn-success { color: var(--text-success); border-color: var(--border-success); background: var(--bg-success); }

  /* ── Stats ── */
  .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 22px; }
  .stat-card {
    background: var(--bg-primary); border: 0.5px solid var(--border-light);
    border-radius: var(--radius-lg); padding: 16px 18px;
    box-shadow: var(--shadow-sm);
  }
  .stat-label { font-size: 11px; color: var(--text-tertiary); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 6px; }
  .stat-val { font-size: 28px; font-weight: 600; color: var(--text-primary); line-height: 1; }
  .stat-sub { font-size: 11px; color: var(--text-tertiary); margin-top: 4px; }
  .stat-card.success .stat-val { color: var(--text-success); }
  .stat-card.danger .stat-val { color: var(--text-danger); }
  .stat-card.warning .stat-val { color: var(--text-warning); }

  /* ── Filter & Search ── */
  .toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
  .filter-tabs { display: flex; gap: 6px; flex-wrap: wrap; }
  .filter-tab {
    padding: 6px 16px; border-radius: 100px; font-size: 12px; cursor: pointer;
    border: 1px solid var(--border-info); background: var(--bg-primary);
    color: var(--text-info); transition: all 0.12s; font-family: var(--font); font-weight: 500;
  }
  .filter-tab.active, .filter-tab:hover { background: var(--text-info); color: #fff; border-color: var(--text-info); }
  .search-box {
    display: flex; align-items: center; gap: 8px;
    background: var(--bg-secondary); border: 0.5px solid var(--border-light);
    border-radius: var(--radius-md); padding: 7px 12px; flex: 1; min-width: 180px;
  }
  .search-box input { border: none; background: none; outline: none; font-size: 13px; color: var(--text-primary); flex: 1; font-family: var(--font); }
  .search-icon { color: var(--text-tertiary); font-size: 14px; }

  /* ── Room Grid ── */
  .room-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; }
  .room-card {
    background: var(--bg-primary); border: 0.5px solid var(--border-light);
    border-radius: var(--radius-lg); overflow: hidden; cursor: pointer;
    transition: border-color 0.15s, box-shadow 0.15s; box-shadow: var(--shadow-sm);
  }
  .room-card:hover { border-color: var(--border-mid); box-shadow: var(--shadow-md); }
  .room-card.empty-room { border-style: dashed; opacity: 0.75; }
  .room-card.expiring { border-color: var(--border-warning); }
  .room-img {
    width: 100%; aspect-ratio: 4/3; background: var(--bg-secondary);
    display: flex; align-items: center; justify-content: center;
    font-size: 32px; overflow: hidden; position: relative;
  }
  .room-img img { width: 100%; height: 100%; object-fit: cover; }
  .room-status-badge {
    position: absolute; top: 8px; right: 8px;
    font-size: 10px; font-weight: 600; padding: 3px 8px;
    border-radius: 100px; letter-spacing: 0.04em;
  }
  .badge-rented { background: var(--bg-success); color: var(--text-success); }
  .badge-empty { background: var(--bg-empty); color: var(--text-tertiary); }
  .badge-expiring { background: var(--bg-warning); color: var(--text-warning); }
  .room-info { padding: 12px 14px 14px; }
  .room-number { font-size: 13px; font-weight: 600; color: var(--text-primary); margin-bottom: 2px; }
  .room-tenant { font-size: 12px; color: var(--text-secondary); margin-bottom: 6px; }
  .room-rent { font-size: 13px; font-weight: 500; color: var(--text-primary); margin-bottom: 6px; }
  .room-pay-status {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 11px; font-weight: 500; padding: 3px 8px;
    border-radius: 100px;
  }
  .pay-paid { background: var(--bg-success); color: var(--text-success); }
  .pay-unpaid { background: var(--bg-danger); color: var(--text-danger); }
  .pay-empty { background: var(--bg-empty); color: var(--text-tertiary); }
  .room-actions { display: flex; gap: 4px; margin-top: 10px; }

  /* ── Modal ── */
  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,0.45);
    display: flex; align-items: center; justify-content: center; z-index: 100;
  }
  .modal {
    background: var(--bg-primary); border-radius: var(--radius-xl);
    border: 0.5px solid var(--border-light); box-shadow: var(--shadow-lg);
    width: 560px; max-width: 96vw; max-height: 92vh; overflow-y: auto;
  }
  .modal-sm { width: 380px; }
  .modal-lg { width: 680px; }
  .modal-header {
    padding: 22px 26px 0; display: flex; align-items: center;
    justify-content: space-between; position: sticky; top: 0;
    background: var(--bg-primary); z-index: 1; padding-bottom: 16px;
    border-bottom: 0.5px solid var(--border-light);
  }
  .modal-title { font-size: 16px; font-weight: 600; color: var(--text-primary); }
  .modal-close {
    width: 30px; height: 30px; border-radius: var(--radius-md);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; border: none; background: none; font-size: 20px;
    color: var(--text-tertiary); transition: background 0.12s; line-height: 1;
  }
  .modal-close:hover { background: var(--bg-secondary); }
  .modal-body { padding: 20px 26px 26px; }
  .modal-footer { display: flex; justify-content: flex-end; gap: 8px; padding-top: 18px; border-top: 0.5px solid var(--border-light); margin-top: 10px; }

  /* ── Form ── */
  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 12px; color: var(--text-secondary); margin-bottom: 6px; font-weight: 500; }
  .field input, .field textarea, .field select {
    width: 100%; padding: 9px 12px; border: 0.5px solid var(--border-mid);
    border-radius: var(--radius-md); font-size: 13px; background: var(--bg-primary);
    color: var(--text-primary); font-family: var(--font); outline: none;
    transition: border-color 0.12s;
  }
  .field input:focus, .field textarea:focus, .field select:focus { border-color: var(--border-strong); }
  .field textarea { resize: vertical; min-height: 70px; }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .field-hint { font-size: 11px; color: var(--text-tertiary); margin-top: 4px; }

  /* ── Detail ── */
  .detail-img {
    width: 100%; max-height: 240px; background: var(--bg-secondary);
    border-radius: var(--radius-md); display: flex; align-items: center;
    justify-content: center; margin-bottom: 18px; overflow: hidden; font-size: 48px;
  }
  .detail-img img { max-width: 100%; max-height: 240px; object-fit: contain; }
  .detail-section { margin-bottom: 18px; }
  .detail-section-title {
    font-size: 11px; color: var(--text-tertiary); letter-spacing: 0.08em;
    text-transform: uppercase; margin-bottom: 10px; font-weight: 500;
  }
  .detail-row { display: flex; gap: 8px; align-items: flex-start; margin-bottom: 8px; }
  .detail-key { font-size: 12px; color: var(--text-tertiary); min-width: 60px; margin-top: 1px; flex-shrink: 0; }
  .detail-val { font-size: 13px; color: var(--text-primary); }

  /* ── Rent History ── */
  .rent-history { margin-top: 6px; }
  .rent-month-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 9px 12px; border-radius: var(--radius-md); margin-bottom: 4px;
    background: var(--bg-secondary); gap: 8px;
  }
  .rent-month-label { font-size: 13px; font-weight: 500; color: var(--text-primary); min-width: 60px; }
  .rent-month-date { font-size: 11px; color: var(--text-tertiary); flex: 1; }
  .rent-month-note { font-size: 11px; color: var(--text-tertiary); flex: 1; font-style: italic; }
  .rent-month-actions { display: flex; gap: 6px; align-items: center; }
  .pay-toggle {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 11px; font-weight: 600; padding: 4px 10px;
    border-radius: 100px; cursor: pointer; border: none; font-family: var(--font);
    transition: all 0.12s;
  }
  .pay-toggle.paid { background: var(--bg-success); color: var(--text-success); }
  .pay-toggle.unpaid { background: var(--bg-danger); color: var(--text-danger); }
  .expiry-badge {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 11px; font-weight: 600; padding: 3px 9px;
    border-radius: 100px; background: var(--bg-warning); color: var(--text-warning);
    margin-left: 6px;
  }

  /* ── Empty state ── */
  .empty { text-align: center; padding: 56px 0; color: var(--text-tertiary); font-size: 14px; }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }

  /* ── Category List ── */
  .cat-list { display: flex; flex-direction: column; gap: 8px; }
  .cat-item {
    background: var(--bg-primary); border: 0.5px solid var(--border-light);
    border-radius: var(--radius-md); padding: 14px 18px;
    display: flex; align-items: center; justify-content: space-between;
    box-shadow: var(--shadow-sm);
  }
  .cat-name { font-size: 14px; font-weight: 500; color: var(--text-primary); }
  .cat-count { font-size: 12px; color: var(--text-tertiary); margin-top: 3px; }

  /* ── Mobile ── */
  .mobile-menu-btn {
    display: none; width: 36px; height: 36px; border-radius: var(--radius-md);
    align-items: center; justify-content: center; cursor: pointer;
    border: 0.5px solid var(--border-light); background: var(--bg-primary);
    color: var(--text-primary); font-size: 18px; flex-shrink: 0;
  }
  .mobile-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 90; }
  .mobile-overlay.open { display: block; }
  .mobile-tabbar {
    display: none; position: fixed; bottom: 0; left: 0; right: 0;
    height: 60px; background: var(--bg-primary);
    border-top: 0.5px solid var(--border-light);
    z-index: 80; align-items: stretch;
    padding-bottom: env(safe-area-inset-bottom);
  }
  .mobile-tab {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 3px; cursor: pointer;
    border: none; background: none; font-family: var(--font);
    color: var(--text-tertiary); font-size: 10px; transition: color 0.15s;
  }
  .mobile-tab .tab-icon { font-size: 20px; line-height: 1; }
  .mobile-tab.active { color: var(--text-primary); font-weight: 500; }

  .sidebar-promo {
    padding: 14px 14px 16px;
    border-radius: var(--radius-lg);
    background: linear-gradient(135deg, #0f2744 0%, #1a3d6b 60%, #1e4d8c 100%);
    position: relative; overflow: hidden;
  }
  .sidebar-promo::before {
    content: ''; position: absolute;
    top: -30px; right: -30px;
    width: 100px; height: 100px;
    border-radius: 50%;
    background: rgba(255,255,255,0.04);
  }
  .sidebar-promo::after {
    content: ''; position: absolute;
    bottom: -20px; left: -20px;
    width: 80px; height: 80px;
    border-radius: 50%;
    background: rgba(255,255,255,0.03);
  }
  .sidebar-promo-label {
    font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase;
    color: rgba(255,255,255,0.45); margin-bottom: 7px; font-weight: 500;
  }
  .sidebar-promo-title {
    font-size: 12px; font-weight: 600; color: #fff;
    line-height: 1.5; margin-bottom: 10px; letter-spacing: 0.01em;
  }
  .sidebar-promo-btn {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 6px 12px; border-radius: 100px;
    background: rgba(255,255,255,0.12);
    border: 0.5px solid rgba(255,255,255,0.2);
    color: #fff; font-size: 11px; font-weight: 500;
    text-decoration: none; cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    font-family: var(--font); letter-spacing: 0.02em;
  }
  .sidebar-promo-btn:hover {
    background: rgba(255,255,255,0.22);
    border-color: rgba(255,255,255,0.35);
  }
  .sidebar-promo-btn svg { width: 10px; height: 10px; opacity: 0.8; }

  [contenteditable] { outline: none; border-radius: 4px; transition: background 0.12s; }
  [contenteditable]:hover { background: var(--bg-secondary); }
  [contenteditable]:focus { background: var(--bg-secondary); box-shadow: 0 0 0 1.5px var(--border-strong); }

  @media (max-width: 768px) {
    .sidebar { display: none; }
    .mobile-tabbar { display: flex; }
    .mobile-menu-btn { display: flex; }
    .topbar { padding: 0 14px; }
    .topbar-actions .btn:not(.btn-primary):not(#add-btn) { display: none !important; }
    .content { padding: 16px 14px; padding-bottom: calc(72px + env(safe-area-inset-bottom) + 8px); }
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    .room-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .filter-tabs { flex-wrap: nowrap; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
    .filter-tabs::-webkit-scrollbar { display: none; }
    .filter-tab { flex-shrink: 0; }
    .modal-backdrop { align-items: flex-end; }
    .modal { width: 100%; max-width: 100%; border-radius: 20px 20px 0 0; max-height: 92vh; padding-bottom: env(safe-area-inset-bottom); }
    .modal-header { padding: 18px 20px 14px; }
    .modal-body { padding: 14px 20px 20px; }
    .field-row { grid-template-columns: 1fr; }
    .toolbar { flex-direction: column; align-items: stretch; }
    .search-box { min-width: unset; }
  }
  @media (max-width: 420px) {
    .stats-row { grid-template-columns: 1fr 1fr; }
    .room-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>
<div id="app">
  <div class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">🏠</div>
      <div class="logo-text" contenteditable="true" spellcheck="false" onblur="saveLabel('logoText',this)" onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur()}">租房管理系統</div>
      <div class="logo-sub" contenteditable="true" spellcheck="false" onblur="saveLabel('logoSub',this)" onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur()}">Rental Management</div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">主選單</div>
      <button class="nav-item active" data-page="rooms" onclick="showPage('rooms')">
        <span class="nav-icon">🏠</span> 房間管理
      </button>
      <button class="nav-item" data-page="areas" onclick="showPage('areas')">
        <span class="nav-icon">📋</span> 區域管理
      </button>
      <div style="padding:10px 8px 4px">
        <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1191429468053714" crossorigin="anonymous"></script>
        <ins class="adsbygoogle"
             style="display:block; text-align:center;"
             data-ad-layout="in-article"
             data-ad-format="fluid"
             data-ad-client="ca-pub-1191429468053714"
             data-ad-slot="4453251457"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
      </div>
    </div>
    <div class="sidebar-bottom">
      <div class="sidebar-promo" style="margin: 0 0 8px;">
        <div class="sidebar-promo-label">電商管理工具</div>
        <div class="sidebar-promo-title">購買更多<br>電商管理工具</div>
        <a href="https://www.seehouse.tw/app" target="_blank" class="sidebar-promo-btn">
          <svg viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M2 10L10 2M10 2H5M10 2V7" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          前往官網
        </a>
      </div>
      <div class="sync-status" id="sync-status">v1.0 · 本地存儲</div>
      <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(event)">
    </div>
  </div>

  <div class="main">
    <div class="topbar">
      <div class="topbar-left">
        <button class="mobile-menu-btn" onclick="toggleMobileMenu()">☰</button>
        <div class="topbar-title" id="page-title" contenteditable="true" spellcheck="false" onblur="savePageTitle(this)" onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur()}">房間管理</div>

        <button class="btn btn-sm" onclick="exportData()">↓ 備份</button>

      </div>

</div>

  <div style="padding:20px 18px 14px;border-bottom:0.5px solid var(--border-light);display:flex;align-items:center;justify-content:space-between">
    <div>
      <div style="font-size:16px;margin-bottom:4px">🏠</div>
      <div style="font-size:13px;font-weight:600">租房管理系統</div>
    </div>
    <button onclick="closeMobileMenu()" style="border:none;background:none;font-size:22px;cursor:pointer;color:var(--text-tertiary)">×</button>
  </div>
  <div style="padding:12px">
    <button class="nav-item active" id="mdrawer-rooms" onclick="showPage('rooms');closeMobileMenu()"><span class="nav-icon">🏠</span> 房間管理</button>

    <span class="tab-icon">🏠</span><span>房間</span>
  </button>

  </button>

    <span class="tab-icon" style="font-size:26px;color:var(--text-primary)">＋</span><span>新增</span>
  </button>
</nav>

<div id="modal-container"></div>

<script>
  // ── 工具函數 ───────────────────────────────────────────────────
  function today() { return new Date().toISOString().slice(0,7); } // YYYY-MM
  function todayFull() { return new Date().toISOString().slice(0,10); } // YYYY-MM-DD
  function monthLabel(ym) {
    const [y,m] = ym.split('-');
    return `${y}年${parseInt(m)}月`;
  }
  function daysUntil(dateStr) {
    if (!dateStr) return null;
    const diff = new Date(dateStr) - new Date();
    return Math.ceil(diff / 86400000);
  }
  function formatDate(d) {
    if (!d) return '—';
    const [y,m,day] = d.split('-');
    return `${y}/${m}/${day}`;
  }

  // 產生前 N 個月份清單（含當月）
  function recentMonths(n) {
    const months = [];
    const now = new Date();
    for (let i = n-1; i >= 0; i--) {
      const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
      months.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`);
    }
    return months;
  }

  // 從租約起始月到當月，最多顯示24個月（舊→新排列）
  function roomMonths(leaseStart) {
    const now = new Date();
    const cur = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
    // 若沒有租約起始月，退回近24個月
    if (!leaseStart) return recentMonths(24);
    const start = leaseStart.slice(0, 7); // YYYY-MM
    const months = [];
    let [y, m] = start.split('-').map(Number);
    while (true) {
      const ym = `${y}-${String(m).padStart(2,'0')}`;
      months.push(ym);
      if (ym === cur) break;
      m++;
      if (m > 12) { m = 1; y++; }
      // 超過24個月只取最後24個
      if (months.length > 300) break; // 防呆
    }
    return months.slice(-24); // 最多24個月，取最近
  }

  // ── Label persistence ──────────────────────────────────────────
  const labelDefaults = {
    logoText: '租房管理系統',
    logoSub: 'Rental Management',
    pageTitle_rooms: '房間管理',
    pageTitle_areas: '區域管理'
  };
  function loadLabels() {
    try { return JSON.parse(localStorage.getItem('rental_labels') || '{}'); } catch(e) { return {}; }
  }
  function saveLabel(key, el) {
    const val = el.innerText.trim();
    if (!val) { el.innerText = labelDefaults[key] || ''; return; }
    const labels = loadLabels(); labels[key] = val;
    localStorage.setItem('rental_labels', JSON.stringify(labels));
    pushLabelsToSheets(labels);
  }
  function savePageTitle(el) {
    const val = el.innerText.trim();
    const key = 'pageTitle_' + currentPage;
    if (!val) { el.innerText = labelDefaults[key] || ''; return; }
    const labels = loadLabels(); labels[key] = val;
    localStorage.setItem('rental_labels', JSON.stringify(labels));
    pushLabelsToSheets(labels);
  }
  function applyLabels() {
    const labels = loadLabels();
    const lt = document.querySelector('.logo-text'); if (lt) lt.innerText = labels.logoText || labelDefaults.logoText;
    const ls = document.querySelector('.logo-sub');  if (ls) ls.innerText = labels.logoSub  || labelDefaults.logoSub;
    const pt = document.getElementById('page-title');
    if (pt) {
      const key = 'pageTitle_' + (typeof currentPage !== 'undefined' ? currentPage : 'rooms');
      pt.innerText = labels[key] || labelDefaults[key] || '';
    }
  }

  // ── Google Sheets sync ─────────────────────────────────────────
  // ── Demo 版：GAS URL 寫死，客人無法修改 ────────────────────────
  const DEMO_GAS_URL = 'https://script.google.com/macros/s/AKfycbzNlS8urXULFFWCxen_fS3tZyhHhrJxlWteapTfPPlKnaWRecQBF1a3h_v-pmIGZdMZ/exec';
  function getScriptUrl() { return DEMO_GAS_URL; }
  function setSyncStatus(msg, color) {
    const els = [document.getElementById('sync-status'), document.getElementById('sync-status-drawer')];
    els.forEach(el => { if (el) { el.textContent = msg; el.style.color = color || ''; } });
  }
  async function pushToSheets(d) {
    const url = getScriptUrl(); if (!url) return;
    setSyncStatus('同步中…', 'var(--text-info)');
    try {
      const labels = loadLabels();
      await fetch(url, { method:'POST', body: JSON.stringify({ action:'save', data: d, labels }) });
      setSyncStatus('✓ 已同步 ' + new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'}), 'var(--text-info)');
    } catch(e) { setSyncStatus('⚠ 同步失敗', 'var(--text-danger)'); }
  }
  async function pushLabelsToSheets(labels) {
    const url = getScriptUrl(); if (!url) return;
    try {
      await fetch(url, { method:'POST', body: JSON.stringify({ action:'save', data, labels }) });
    } catch(e) {}
  }
  async function pullFromSheets() {
    const url = getScriptUrl(); if (!url) return null;
    setSyncStatus('載入中…', 'var(--text-info)');
    try {
      const res = await fetch(url + '?action=load');
      const d = await res.json();
      if (d && d.areas !== undefined && d.rooms !== undefined) {
        // 套用雲端 labels
        if (d.labels && typeof d.labels === 'object') {
          localStorage.setItem('rental_labels', JSON.stringify(d.labels));
          applyLabels();
          const key = 'pageTitle_' + currentPage;
          const titleEl = document.getElementById('page-title');
          if (titleEl) titleEl.innerText = d.labels[key] || labelDefaults[key] || '';
        }
        setSyncStatus('✓ 已同步 ' + new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'}), 'var(--text-info)');
        return d;
      }
    } catch(e) { setSyncStatus('⚠ 載入失敗，使用本地資料', 'var(--text-danger)'); }
    return null;
  }
  function openSyncSettings() {
    const current = getScriptUrl();
    openModal(`
      <div class="modal modal-sm">
        <div class="modal-header">
          <div class="modal-title">⚙ 雲端同步設定</div>
          <button class="modal-close" onclick="closeModal()">×</button>
        </div>
        <div class="modal-body">
          <div class="field">
            <label>Google Apps Script 網址</label>
            <input id="f-gsurl" type="url" value="${current}" placeholder="https://script.google.com/macros/s/...">
          </div>
          <div style="font-size:12px;color:var(--text-tertiary);margin-bottom:16px;line-height:1.6">
            設定後每次新增/編輯/刪除都會自動同步到 Google Sheets。<br>
            設定時會自動比對雲端資料，若雲端有資料會優先載入雲端。
          </div>
          <div class="modal-footer">
            <button class="btn" onclick="closeModal()">取消</button>
            <button class="btn" onclick="testSync()">測試連線</button>
            <button class="btn btn-primary" onclick="saveSyncUrl()">儲存</button>
          </div>
        </div>
      </div>
    `);
  }
  async function saveSyncUrl() {
    const url = document.getElementById('f-gsurl').value.trim();
    closeModal();
    if (!url) { setSyncStatus('v1.0 · 本地存儲', ''); return; }

    // 先從雲端拉資料
    setSyncStatus('連線中…', 'var(--text-info)');
    try {
      const res = await fetch(url + '?action=load');
      const remote = await res.json();
      const cloudHasData = remote && remote.rooms && remote.rooms.length > 0;

      if (cloudHasData) {
        // 雲端有資料 → 載入雲端（含 labels）
        if (remote.labels && typeof remote.labels === 'object') {
          localStorage.setItem('rental_labels', JSON.stringify(remote.labels));
          applyLabels();
        }
        data = remote;
        saveLocal(); render();
        setSyncStatus('✓ 已從雲端載入', 'var(--text-info)');
      } else {
        // 雲端是空的 → 詢問是否上傳本地資料
        const localHasData = data.rooms && data.rooms.length > 0;
        if (localHasData) {
          if (confirm(`雲端目前是空的。\n要把本機的 ${data.rooms.length} 間房間上傳到雲端嗎？`)) {
            await pushToSheets(data);
          } else {
            setSyncStatus('✓ 已連線（雲端空白）', 'var(--text-info)');
          }
        } else {
          setSyncStatus('✓ 已連線（雲端空白）', 'var(--text-info)');
        }
      }
    } catch(e) {
      setSyncStatus('⚠ 連線失敗，請確認網址', 'var(--text-danger)');
    }
  }
  async function testSync() {
    const url = document.getElementById('f-gsurl').value.trim();
    if (!url) { alert('請先貼上網址'); return; }
    try {
      const res = await fetch(url + '?action=load');
      const d = await res.json();
      if (d && d.rooms !== undefined) alert('✓ 連線成功！Google Sheets 已就緒。');
      else alert('⚠ 回應格式有誤，請確認 Apps Script 已正確部署。');
    } catch(e) { alert('⚠ 連線失敗：' + e.message); }
  }

  // ── Data ───────────────────────────────────────────────────────
  function loadData() {
    try {
      const d = localStorage.getItem('rental_data_v1');
      if (d) return JSON.parse(d);
    } catch(e) {}
    return { areas: ['A棟','B棟'], rooms: [] };
  }
  function saveLocal() { localStorage.setItem('rental_data_v1', JSON.stringify(data)); }
  function saveData() { saveLocal(); pushToSheets(data); }

  let data = loadData();
  let currentPage = 'rooms';
  let filterArea = 'all';
  let filterStatus = 'all'; // all | rented | empty | expiring
  let searchQ = '';

  // ── Render ─────────────────────────────────────────────────────
  function showPage(p) {
    currentPage = p;
    document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
    document.querySelectorAll(`.nav-item[data-page="${p}"]`).forEach(el => el.classList.add('active'));
    const labels = loadLabels();
    const key = 'pageTitle_' + p;
    document.getElementById('page-title').innerText = labels[key] || labelDefaults[key] || '';
    document.getElementById('add-btn').textContent = p === 'rooms' ? '＋ 新增房間' : '＋ 新增區域';
    render();
  }

  function render() {
    const area = document.getElementById('content-area');
    if (currentPage === 'rooms') renderRooms(area);
    else renderAreas(area);
  }

  function calcStats() {
    const total = data.rooms.length;
    const rented = data.rooms.filter(r => r.tenantName).length;
    const empty = total - rented;
    const thisMonth = today();
    const paid = data.rooms.filter(r => {
      if (!r.tenantName) return false;
      const rec = (r.rentHistory||[]).find(h => h.month === thisMonth);
      return rec && rec.paid;
    }).length;
    const unpaid = rented - paid;
    const expiring = data.rooms.filter(r => {
      const d = daysUntil(r.leaseEnd);
      return d !== null && d >= 0 && d <= 30;
    }).length;
    return { total, rented, empty, paid, unpaid, expiring };
  }

  function renderRooms(area) {
    if (!area.querySelector('#rooms-shell')) {
      area.innerHTML = `<div id="rooms-shell">
        <div class="stats-row" id="stats-row"></div>
        <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px">
          <div class="filter-tabs" id="filter-area-tabs"></div>
        </div>
        <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:16px">
          <div class="filter-tabs" id="filter-status-tabs"></div>
          <div class="search-box" style="flex:1;min-width:180px">
            <span class="search-icon">⌕</span>
            <input type="text" id="search-input" placeholder="搜尋房號、租客名稱...">
          </div>
        </div>
        <div class="room-grid" id="room-grid"></div>
      </div>`;
      document.getElementById('search-input').addEventListener('input', function() {
        searchQ = this.value; renderRoomGrid();
      });
    }

    const s = calcStats();
    document.getElementById('stats-row').innerHTML = `
      <div class="stat-card">
        <div class="stat-label">總房間數</div>
        <div class="stat-val">${s.total}</div>
        <div class="stat-sub">已出租 ${s.rented} 間</div>
      </div>
      <div class="stat-card ${s.empty > 0 ? 'warning' : ''}">
        <div class="stat-label">空置</div>
        <div class="stat-val">${s.empty}</div>
        <div class="stat-sub">空置中</div>
      </div>
      <div class="stat-card success">
        <div class="stat-label">本月已繳</div>
        <div class="stat-val">${s.paid}</div>
        <div class="stat-sub">間已繳租</div>
      </div>
      <div class="stat-card ${s.unpaid > 0 ? 'danger' : ''}">
        <div class="stat-label">本月未繳</div>
        <div class="stat-val">${s.unpaid}</div>
        <div class="stat-sub">${s.expiring > 0 ? `⚠ ${s.expiring} 間即將到期` : '間未繳租'}</div>
      </div>
    `;

    // 區域 tabs
    const areaTabs = document.getElementById('filter-area-tabs');
    const areas = ['all', ...data.areas];
    areaTabs.innerHTML = areas.map(a =>
      `<button class="filter-tab ${filterArea===a?'active':''}" data-area="${a}">${a==='all'?'全部區域':a}</button>`
    ).join('');
    areaTabs.querySelectorAll('.filter-tab').forEach(btn => {
      btn.addEventListener('click', () => { filterArea = btn.dataset.area; renderRoomGrid(); });
    });

    // 狀態 tabs
    const statusTabs = document.getElementById('filter-status-tabs');
    const statuses = [
      { key:'all', label:'全部' },
      { key:'rented', label:'出租中' },
      { key:'empty', label:'空置' },
      { key:'unpaid', label:'未繳租' },
      { key:'expiring', label:'即將到期' },
    ];
    statusTabs.innerHTML = statuses.map(s =>
      `<button class="filter-tab ${filterStatus===s.key?'active':''}" data-status="${s.key}">${s.label}</button>`
    ).join('');
    statusTabs.querySelectorAll('.filter-tab').forEach(btn => {
      btn.addEventListener('click', () => { filterStatus = btn.dataset.status; renderRoomGrid(); });
    });

    const si = document.getElementById('search-input');
    if (si && si.value !== searchQ) si.value = searchQ;
    renderRoomGrid();
  }

  function renderRoomGrid() {
    const grid = document.getElementById('room-grid');
    if (!grid) return;
    const thisMonth = today();

    let rooms = data.rooms;
    if (filterArea !== 'all') rooms = rooms.filter(r => r.area === filterArea);
    if (filterStatus === 'rented') rooms = rooms.filter(r => r.tenantName);
    else if (filterStatus === 'empty') rooms = rooms.filter(r => !r.tenantName);
    else if (filterStatus === 'unpaid') rooms = rooms.filter(r => {
      if (!r.tenantName) return false;
      const rec = (r.rentHistory||[]).find(h => h.month === thisMonth);
      return !rec || !rec.paid;
    });
    else if (filterStatus === 'expiring') rooms = rooms.filter(r => {
      const d = daysUntil(r.leaseEnd); return d !== null && d >= 0 && d <= 30;
    });
    if (searchQ) rooms = rooms.filter(r =>
      r.roomNo.includes(searchQ) || (r.tenantName||'').includes(searchQ) || (r.note||'').includes(searchQ)
    );

    if (rooms.length === 0) {
      grid.innerHTML = `<div class="empty" style="grid-column:1/-1">
        <div class="empty-icon">🏠</div>
        <div>尚無符合條件的房間</div>
      </div>`;
      return;
    }

    grid.innerHTML = rooms.map(r => {
      const rec = (r.rentHistory||[]).find(h => h.month === thisMonth);
      const isRented = !!r.tenantName;
      const isPaid = isRented && rec && rec.paid;
      const days = daysUntil(r.leaseEnd);
      const isExpiring = isRented && days !== null && days >= 0 && days <= 30;

      let badgeHtml = '';
      if (!isRented) badgeHtml = `<span class="room-status-badge badge-empty">空置</span>`;
      else if (isExpiring) badgeHtml = `<span class="room-status-badge badge-expiring">⚠ ${days}天到期</span>`;
      else badgeHtml = `<span class="room-status-badge badge-rented">出租中</span>`;

      let payHtml = '';
      if (!isRented) payHtml = `<span class="room-pay-status pay-empty">空置</span>`;
      else if (isPaid) payHtml = `<span class="room-pay-status pay-paid">✓ 本月已繳</span>`;
      else payHtml = `<span class="room-pay-status pay-unpaid">✗ 本月未繳</span>`;

      return `
        <div class="room-card ${!isRented?'empty-room':''} ${isExpiring?'expiring':''}"
             draggable="true" data-id="${r.id}" onclick="openRoomDetail('${r.id}')">
          <div class="room-img">
            ${r.img ? `<img src="${r.img}" onerror="this.style.display='none'">` : '🏠'}
            ${badgeHtml}
          </div>
          <div class="room-info">
            <div class="room-number">${r.roomNo}${r.area ? ` · ${r.area}` : ''}</div>
            <div class="room-tenant">${r.tenantName || '（空置中）'}</div>
            <div class="room-rent">${r.rent ? `NT$ ${Number(r.rent).toLocaleString()} / 月` : '未設定租金'}</div>
            ${payHtml}
            <div class="room-actions" onclick="event.stopPropagation()">
              <button class="btn btn-sm" onclick="openEditRoom('${r.id}')">編輯</button>
              <button class="btn btn-sm btn-danger" onclick="deleteRoom('${r.id}')">刪除</button>
            </div>
          </div>
        </div>
      `;
    }).join('');
    initRoomDrag();
  }

  function initRoomDrag() {
    const grid = document.getElementById('room-grid');
    if (!grid) return;
    let dragId = null;
    grid.querySelectorAll('.room-card[draggable]').forEach(card => {
      card.addEventListener('dragstart', e => {
        dragId = card.dataset.id;
        setTimeout(() => card.style.opacity = '0.4', 0);
        e.dataTransfer.effectAllowed = 'move';
      });
      card.addEventListener('dragend', () => {
        dragId = null;
        grid.querySelectorAll('.room-card').forEach(c => {
          c.style.opacity = '';
          c.style.outline = '';
        });
      });
      card.addEventListener('dragover', e => {
        e.preventDefault();
        grid.querySelectorAll('.room-card').forEach(c => c.style.outline = '');
        if (card.dataset.id !== dragId)
          card.style.outline = '2px solid var(--text-info)';
      });
      card.addEventListener('dragleave', () => { card.style.outline = ''; });
      card.addEventListener('drop', e => {
        e.preventDefault();
        const toId = card.dataset.id;
        if (!dragId || dragId === toId) return;
        const fromIdx = data.rooms.findIndex(r => r.id === dragId);
        const toIdx   = data.rooms.findIndex(r => r.id === toId);
        const [moved] = data.rooms.splice(fromIdx, 1);
        data.rooms.splice(toIdx, 0, moved);
        saveData();
        renderRoomGrid();
      });
    });
  }

  function renderAreas(area) {
    area.innerHTML = `
      <div class="cat-list" id="area-list">
        ${data.areas.map((a,i) => `
          <div class="cat-item" draggable="true" data-idx="${i}" style="cursor:grab">
            <div style="display:flex;align-items:center;gap:10px">
              <span style="color:var(--text-tertiary);font-size:16px;cursor:grab;flex-shrink:0">⠿</span>
              <div>
                <div class="cat-name">${a}</div>
                <div class="cat-count">${data.rooms.filter(r=>r.area===a).length} 間房間</div>
              </div>
            </div>
            <div style="display:flex;gap:6px">
              <button class="btn btn-sm" onclick="openEditArea(${i})">編輯</button>
              <button class="btn btn-sm btn-danger" onclick="deleteArea(${i})">刪除</button>
            </div>
          </div>
        `).join('')}
        ${data.areas.length === 0 ? '<div class="empty">尚無區域</div>' : ''}
      </div>
    `;
    initAreaDrag();
  }

  function initAreaDrag() {
    const list = document.getElementById('area-list');
    if (!list) return;
    let dragIdx = null;
    list.querySelectorAll('.cat-item[draggable]').forEach(item => {
      item.addEventListener('dragstart', e => {
        dragIdx = parseInt(item.dataset.idx);
        item.style.opacity = '0.4';
        e.dataTransfer.effectAllowed = 'move';
      });
      item.addEventListener('dragend', () => {
        dragIdx = null;
        list.querySelectorAll('.cat-item').forEach(c => {
          c.style.opacity = '';
          c.style.boxShadow = '';
        });
      });
      item.addEventListener('dragover', e => {
        e.preventDefault();
        list.querySelectorAll('.cat-item').forEach(c => c.style.boxShadow = '');
        const toIdx = parseInt(item.dataset.idx);
        if (dragIdx !== null && toIdx !== dragIdx)
          item.style.boxShadow = toIdx < dragIdx
            ? '0 -3px 0 var(--text-info)'
            : '0 3px 0 var(--text-info)';
      });
      item.addEventListener('dragleave', () => { item.style.boxShadow = ''; });
      item.addEventListener('drop', e => {
        e.preventDefault();
        const toIdx = parseInt(item.dataset.idx);
        if (dragIdx === null || dragIdx === toIdx) return;
        const [moved] = data.areas.splice(dragIdx, 1);
        data.areas.splice(toIdx, 0, moved);
        saveData();
        renderAreas(document.getElementById('content-area'));
      });
    });
  }

  // ── Modal ──────────────────────────────────────────────────────
  function openModal(html) {
    document.getElementById('modal-container').innerHTML = `<div class="modal-backdrop">${html}</div>`;
  }
  function closeModal() { document.getElementById('modal-container').innerHTML = ''; }

  // ── Room Detail ────────────────────────────────────────────────
  function openRoomDetail(id) {
    const r = data.rooms.find(x => x.id === id);
    if (!r) return;
    const days = daysUntil(r.leaseEnd);
    const isExpiring = r.tenantName && days !== null && days >= 0 && days <= 30;
    const months = roomMonths(r.leaseStart);

    const historyHtml = !r.tenantName ? `<div style="color:var(--text-tertiary);font-size:13px">（空置中，無租金記錄）</div>` :
      months.map(m => {
        const rec = (r.rentHistory||[]).find(h => h.month === m) || { month: m, paid: false, date: '', note: '' };
        return `
          <div class="rent-month-row">
            <div class="rent-month-label">${monthLabel(m)}</div>
            <div class="rent-month-date">${rec.paid && rec.date ? formatDate(rec.date) : ''}</div>
            <div class="rent-month-note">${rec.note||''}</div>
            <div class="rent-month-actions">
              <button class="pay-toggle ${rec.paid?'paid':'unpaid'}" onclick="togglePay('${id}','${m}')">
                ${rec.paid ? '✓ 已繳' : '✗ 未繳'}
              </button>
              <button class="btn btn-sm" onclick="openPayNote('${id}','${m}')">備註</button>
            </div>
          </div>
        `;
      }).join('');

    openModal(`
      <div class="modal modal-lg">
        <div class="modal-header">
          <div class="modal-title">
            ${r.roomNo}
            ${isExpiring ? `<span class="expiry-badge">⚠ 剩 ${days} 天到期</span>` : ''}
          </div>
          <button class="modal-close" onclick="closeModal()">×</button>
        </div>
        <div class="modal-body">
          <div class="detail-img">
            ${r.img ? `<img src="${r.img}" onerror="this.parentElement.innerHTML='🏠'">` : '🏠'}
          </div>

          <div class="detail-section">
            <div class="detail-section-title">房間資訊</div>
            <div class="detail-row"><span class="detail-key">房號</span><span class="detail-val">${r.roomNo}</span></div>
            <div class="detail-row"><span class="detail-key">區域</span><span class="detail-val">${r.area||'—'}</span></div>
            <div class="detail-row"><span class="detail-key">坪數</span><span class="detail-val">${r.size ? r.size+' 坪' : '—'}</span></div>
            <div class="detail-row"><span class="detail-key">月租金</span><span class="detail-val" style="font-weight:600;color:var(--text-info)">${r.rent ? 'NT$ '+Number(r.rent).toLocaleString() : '—'}</span></div>
            <div class="detail-row"><span class="detail-key">押金</span><span class="detail-val">${r.deposit ? 'NT$ '+Number(r.deposit).toLocaleString()+(r.depositPaid?'（已收）':'（未收）') : '—'}</span></div>
            <div class="detail-row"><span class="detail-key">備註</span><span class="detail-val">${r.note||'—'}</span></div>
          </div>

          <div class="detail-section">
            <div class="detail-section-title">租客資訊</div>
            ${!r.tenantName ? `<div style="color:var(--text-tertiary);font-size:13px">（空置中）</div>` : `
              <div class="detail-row"><span class="detail-key">姓名</span><span class="detail-val">${r.tenantName}</span></div>
              <div class="detail-row"><span class="detail-key">電話</span><span class="detail-val">${r.tenantPhone||'—'}</span></div>
              <div class="detail-row"><span class="detail-key">租約</span><span class="detail-val">${formatDate(r.leaseStart)} ～ ${formatDate(r.leaseEnd)}</span></div>
            `}
          </div>

          <div class="detail-section">
            <div class="detail-section-title">租金記錄（從起租月起，最多24個月）</div>
            <div class="rent-history">${historyHtml}</div>
          </div>

          <div class="modal-footer">
            <button class="btn" onclick="closeModal();openEditRoom('${r.id}')">編輯</button>
            <button class="btn btn-primary" onclick="closeModal()">關閉</button>
          </div>
        </div>
      </div>
    `);
  }

  // ── Pay Toggle ─────────────────────────────────────────────────
  function togglePay(roomId, month) {
    const r = data.rooms.find(x => x.id === roomId);
    if (!r) return;
    if (!r.rentHistory) r.rentHistory = [];
    let rec = r.rentHistory.find(h => h.month === month);
    if (!rec) { rec = { month, paid: false, date: '', note: '' }; r.rentHistory.push(rec); }
    rec.paid = !rec.paid;
    if (rec.paid && !rec.date) rec.date = todayFull();
    else if (!rec.paid) rec.date = '';
    saveData();
    openRoomDetail(roomId); // 重新開啟更新畫面
  }

  function openPayNote(roomId, month) {
    const r = data.rooms.find(x => x.id === roomId);
    if (!r) return;
    if (!r.rentHistory) r.rentHistory = [];
    let rec = r.rentHistory.find(h => h.month === month);
    if (!rec) { rec = { month, paid: false, date: '', note: '' }; r.rentHistory.push(rec); }
    openModal(`
      <div class="modal modal-sm">
        <div class="modal-header">
          <div class="modal-title">${monthLabel(month)} 繳租備註</div>
          <button class="modal-close" onclick="openRoomDetail('${roomId}')">×</button>
        </div>
        <div class="modal-body">
          <div class="field">
            <label>繳租日期</label>
            <input id="pn-date" type="date" value="${rec.date||''}">
          </div>
          <div class="field">
            <label>備註（遲繳、部分繳等）</label>
            <input id="pn-note" type="text" value="${rec.note||''}" placeholder="輸入備註">
          </div>
          <div class="modal-footer">
            <button class="btn" onclick="openRoomDetail('${roomId}')">取消</button>
            <button class="btn btn-primary" onclick="savePayNote('${roomId}','${month}')">儲存</button>
          </div>
        </div>
      </div>
    `);
  }

  function savePayNote(roomId, month) {
    const r = data.rooms.find(x => x.id === roomId);
    if (!r) return;
    let rec = r.rentHistory.find(h => h.month === month);
    if (!rec) { rec = { month, paid: false, date: '', note: '' }; r.rentHistory.push(rec); }
    rec.date = document.getElementById('pn-date').value;
    rec.note = document.getElementById('pn-note').value.trim();
    saveData();
    openRoomDetail(roomId);
  }

  // ── Edit Room ──────────────────────────────────────────────────
  function openAddModal() {
    if (currentPage === 'rooms') openEditRoom(null);
    else openEditArea(null);
  }

  function openEditRoom(id) {
    const r = id ? data.rooms.find(x => x.id === id) : null;
    openModal(`
      <div class="modal">
        <div class="modal-header">
          <div class="modal-title">${r ? '編輯房間' : '新增房間'}</div>
          <button class="modal-close" onclick="closeModal()">×</button>
        </div>
        <div class="modal-body">
          <div style="font-size:11px;color:var(--text-tertiary);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:12px;font-weight:500">房間資訊</div>
          <div class="field-row">
            <div class="field"><label>房號 *</label><input id="f-roomno" type="text" value="${r?r.roomNo:''}" placeholder="例：301"></div>
            <div class="field"><label>區域</label>
              <select id="f-area">
                <option value="">未分區</option>
                ${data.areas.map(a=>`<option value="${a}" ${r&&r.area===a?'selected':''}>${a}</option>`).join('')}
              </select>
            </div>
          </div>
          <div class="field-row">
            <div class="field"><label>坪數</label><input id="f-size" type="number" min="0" step="0.5" value="${r?r.size:''}" placeholder="例：8"></div>
            <div class="field"><label>月租金（NT$）</label><input id="f-rent" type="number" min="0" value="${r?r.rent:''}" placeholder="例：8000"></div>
          </div>
          <div class="field-row">
            <div class="field"><label>押金金額（NT$）</label><input id="f-deposit" type="number" min="0" value="${r?r.deposit:''}" placeholder="例：16000"></div>
            <div class="field"><label>押金狀態</label>
              <select id="f-depositpaid">
                <option value="0" ${r&&!r.depositPaid?'selected':''}>未收</option>
                <option value="1" ${r&&r.depositPaid?'selected':''}>已收</option>
              </select>
            </div>
          </div>
          <div class="field"><label>房間縮圖網址</label><input id="f-img" type="url" value="${r?r.img||'':''}" placeholder="https://..."></div>
          <div class="field"><label>備註</label><textarea id="f-note" placeholder="附傢俱、含水電等…">${r?r.note||'':''}</textarea></div>

          <div style="font-size:11px;color:var(--text-tertiary);letter-spacing:0.08em;text-transform:uppercase;margin:18px 0 12px;font-weight:500;border-top:0.5px solid var(--border-light);padding-top:16px">租客資訊（空白代表空置）</div>
          <div class="field"><label>租客姓名</label><input id="f-tenant" type="text" value="${r?r.tenantName||'':''}" placeholder="姓名（留空為空置）"></div>
          <div class="field"><label>聯絡電話</label><input id="f-phone" type="tel" value="${r?r.tenantPhone||'':''}" placeholder="0912-345-678"></div>
          <div class="field-row">
            <div class="field"><label>租約開始日</label><input id="f-lstart" type="date" value="${r?r.leaseStart||'':''}"></div>
            <div class="field"><label>租約結束日</label><input id="f-lend" type="date" value="${r?r.leaseEnd||'':''}"></div>
          </div>

          <div class="modal-footer">
            <button class="btn" onclick="closeModal()">取消</button>
            <button class="btn btn-primary" onclick="saveRoom('${id||''}')">儲存</button>
          </div>
        </div>
      </div>
    `);
  }

  function saveRoom(id) {
    const roomNo = document.getElementById('f-roomno').value.trim();
    if (!roomNo) { alert('請輸入房號'); return; }
    const existing = id ? data.rooms.find(x => x.id === id) : null;
    const room = {
      id: id || 'r' + Date.now(),
      roomNo,
      area: document.getElementById('f-area').value,
      size: document.getElementById('f-size').value,
      rent: document.getElementById('f-rent').value,
      deposit: document.getElementById('f-deposit').value,
      depositPaid: document.getElementById('f-depositpaid').value === '1',
      img: document.getElementById('f-img').value.trim(),
      note: document.getElementById('f-note').value.trim(),
      tenantName: document.getElementById('f-tenant').value.trim(),
      tenantPhone: document.getElementById('f-phone').value.trim(),
      leaseStart: document.getElementById('f-lstart').value,
      leaseEnd: document.getElementById('f-lend').value,
      rentHistory: existing ? (existing.rentHistory || []) : [],
    };
    if (id) { const i = data.rooms.findIndex(x => x.id === id); data.rooms[i] = room; }
    else data.rooms.push(room);
    saveData(); closeModal(); render();
  }

  function deleteRoom(id) {
    if (!confirm('確定刪除此房間？租金記錄也會一併刪除。')) return;
    data.rooms = data.rooms.filter(r => r.id !== id);
    saveData(); render();
  }

  // ── Area CRUD ──────────────────────────────────────────────────
  function openEditArea(idx) {
    const a = idx !== null ? data.areas[idx] : '';
    openModal(`
      <div class="modal modal-sm">
        <div class="modal-header">
          <div class="modal-title">${idx !== null ? '編輯區域' : '新增區域'}</div>
          <button class="modal-close" onclick="closeModal()">×</button>
        </div>
        <div class="modal-body">
          <div class="field"><label>區域名稱 *</label><input id="f-areaname" type="text" value="${a}" placeholder="例：A棟、2樓…"></div>
          <div class="modal-footer">
            <button class="btn" onclick="closeModal()">取消</button>
            <button class="btn btn-primary" onclick="saveArea(${idx})">儲存</button>
          </div>
        </div>
      </div>
    `);
  }

  function saveArea(idx) {
    const name = document.getElementById('f-areaname').value.trim();
    if (!name) { alert('請輸入區域名稱'); return; }
    if (idx !== null) {
      const old = data.areas[idx];
      data.areas[idx] = name;
      data.rooms.forEach(r => { if (r.area === old) r.area = name; });
    } else {
      if (data.areas.includes(name)) { alert('區域已存在'); return; }
      data.areas.push(name);
    }
    saveData(); closeModal(); render();
  }

  function deleteArea(idx) {
    const a = data.areas[idx];
    const count = data.rooms.filter(r => r.area === a).length;
    if (!confirm(`確定刪除「${a}」區域？${count > 0 ? `\n此區域下有 ${count} 間房間，區域欄位將被清空。` : ''}`)) return;
    data.areas.splice(idx, 1);
    data.rooms.forEach(r => { if (r.area === a) r.area = ''; });
    saveData(); render();
  }

  // ── Import / Export ────────────────────────────────────────────
  function exportData() {
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = '租房資料_' + todayFull() + '.json';
    a.click();
  }

  function importData(e) {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const d = JSON.parse(ev.target.result);
        if (!d.areas || !d.rooms) { alert('JSON 格式不正確'); return; }
        if (!confirm(`確定匯入？現有資料將被覆蓋。\n共 ${d.rooms.length} 間房間，${d.areas.length} 個區域`)) return;
        data = d; saveData(); render();
      } catch { alert('JSON 解析失敗'); }
    };
    reader.readAsText(file);
    e.target.value = '';
  }

  // ── Mobile menu ────────────────────────────────────────────────
  function toggleMobileMenu() {
    const drawer = document.getElementById('mobile-sidebar-drawer');
    const overlay = document.getElementById('mobile-overlay');
    const isOpen = drawer.style.transform === 'translateX(0px)' || drawer.style.transform === 'translateX(0)';
    if (isOpen) closeMobileMenu();
    else { drawer.style.transform = 'translateX(0)'; overlay.classList.add('open'); }
  }
  function closeMobileMenu() {
    document.getElementById('mobile-sidebar-drawer').style.transform = 'translateX(-100%)';
    document.getElementById('mobile-overlay').classList.remove('open');
  }

  applyLabels();

  // 同步手機底部 tab 狀態
  const _showPageOrig = showPage;
  window.showPage = function(p) {
    _showPageOrig(p);
    document.querySelectorAll('.mobile-tab[id]').forEach(t => t.classList.remove('active'));
    const tabEl = document.getElementById('tab-' + p);
    if (tabEl) tabEl.classList.add('active');
    document.querySelectorAll('#mobile-sidebar-drawer .nav-item').forEach(el => el.classList.remove('active'));
    const drawerEl = document.getElementById('mdrawer-' + p);
    if (drawerEl) drawerEl.classList.add('active');
  };

  // ── 啟動 ───────────────────────────────────────────────────────
  (async () => {
    if (getScriptUrl()) {
      const remote = await pullFromSheets();
      if (remote) { data = remote; saveLocal(); }
    }
    render();
  })();
</script>
</body>
</html>
